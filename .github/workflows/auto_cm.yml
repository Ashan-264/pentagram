name: Auto Commit if No Activity

on:
  schedule:
    - cron: "0 3 * * *"  # Runs at 3 AM UTC (10 PM EST)
  workflow_dispatch:  # Allows manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # We will use a personal access token

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install gitpython pytz

      - name: Run commit check script
        run: python auto_commit.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
